{% extends "base.html" %}

{% block main %}
    <h1>Confirm Email page</h1>
    <form action="{% url 'confirm' %}" method="post">
        {% csrf_token %}
        <label for="email">Email</label>
        <input required type="email" name="email" value="{{user.email|default:''}}"> <br>

        <label for="code">Enter code we have sent to ur email</label>
        <input required type="text" name="code" placeholder="Enter 6 digits code"> <br>


        <button type="submit">Confirm Email</button>


    </form>
        <p style="color: red;">{{error}}</p>

{% endblock %}
